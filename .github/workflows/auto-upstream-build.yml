name: Auto Build on Upstream Release

on:
  schedule:
    # Check every 6 hours for new releases
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-upstream-release:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_release.outputs.should_build }}
      release_tag: ${{ steps.check_release.outputs.release_tag }}
      release_name: ${{ steps.check_release.outputs.release_name }}

    steps:
      - name: Check for new upstream release
        id: check_release
        shell: bash
        run: |
          # Get latest release from upstream VideoRenderer
          UPSTREAM_RELEASE=$(curl -sSL https://api.github.com/repos/Aleksoid1978/VideoRenderer/releases/latest)
          UPSTREAM_TAG=$(echo "$UPSTREAM_RELEASE" | jq -r '.tag_name')
          UPSTREAM_NAME=$(echo "$UPSTREAM_RELEASE" | jq -r '.name')
          
          echo "Latest upstream release: $UPSTREAM_TAG"
          
          # Get our latest release
          OUR_RELEASES=$(curl -sSL https://api.github.com/repos/${{ github.repository }}/releases)
          OUR_LATEST_BODY=$(echo "$OUR_RELEASES" | jq -r '.[0].body // ""')
          
          # Check if our latest release mentions this upstream version
          if echo "$OUR_LATEST_BODY" | grep -q "Upstream: $UPSTREAM_TAG"; then
            echo "We already have a build for upstream $UPSTREAM_TAG"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New upstream release found: $UPSTREAM_TAG"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "release_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "release_name=$UPSTREAM_NAME" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: windows-2022
    needs: check-upstream-release
    if: needs.check-upstream-release.outputs.should_build == 'true'

    steps:
      - name: Set TimeZone
        shell: pwsh
        run: tzutil /s "UTC"

      - name: Show system info
        shell: pwsh
        run: |
          Get-CimInstance -ClassName Win32_Processor
          systeminfo

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update from upstream
        shell: bash
        run: |
          # Add upstream remote if not exists
          git remote add upstream https://github.com/Aleksoid1978/VideoRenderer.git || true
          
          # Fetch latest from upstream
          git fetch upstream
          
          # Merge upstream changes
          git merge upstream/master --no-edit || {
            echo "Merge conflicts detected. Manual intervention required."
            exit 1
          }

      - name: Select Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          (Get-Content .\platform.props) | ForEach-Object { $_ -replace ">10.0<", ">10.0.22621.0<" } | Set-Content .\platform.props

      - name: Set up MSYS
        shell: pwsh
        run: |
          curl -sSL https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z -o MSYS_MinGW-w64_GCC_1421_x86-x64.7z
          7z x MSYS_MinGW-w64_GCC_1421_x86-x64.7z -oC:\MSYS

      - name: Create build directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "_bin\shaders"
          New-Item -ItemType Directory -Force -Path "_bin\lib"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x64"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x86"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x64"

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "VideoRenderer-Auto-Build-Logs"
          path: _bin/logs/
          compression-level: 9
        continue-on-error: true

      - name: Generate release tag
        shell: bash
        run: |
          TIMESTAMP=$(date +"%Y.%m.%d-%H%M")
          echo "tag=auto-$TIMESTAMP" >> $GITHUB_ENV
          echo "timestamp=$TIMESTAMP" >> $GITHUB_ENV

      - name: Create Automatic Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag }}
          name: "Auto Build - Upstream ${{ needs.check-upstream-release.outputs.release_tag }}"
          files: |
            _bin/**/*.ax
            _bin/**/*.zip
          body: |
            🤖 **Automatic build triggered by new upstream release**
            
            **Upstream Release**: ${{ needs.check-upstream-release.outputs.release_name }}
            **Upstream Tag**: ${{ needs.check-upstream-release.outputs.release_tag }}
            **Build Date**: ${{ env.timestamp }}
            
            ## What's included:
            - MpcVideoRenderer64.ax (64-bit DirectShow filter)
            - MpcVideoRenderer.ax (32-bit DirectShow filter)  
            - Installation packages
            
            ## Features:
            - HDR10 metadata tonemapping support (from the excellent work of: https://github.com/thefallentree/mpc-VideoRenderer)
            - HDR nits value saving fix (from the excellent work of: https://github.com/thefallentree/mpc-VideoRenderer)
            - Latest upstream improvements from ${{ needs.check-upstream-release.outputs.release_tag }}
            
            ---
            **Note**: This is an automated build. Please report any issues.
            
            Upstream: ${{ needs.check-upstream-release.outputs.release_tag }}
            Built from commit: ${{ github.sha }}