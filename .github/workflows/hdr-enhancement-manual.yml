name: HDR Enhancement Manual Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release (true/false)'
        required: false
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      release_name:
        description: 'Custom release name (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-2022
    # Only allow this to run on hdr-enhancement branch
    if: github.ref == 'refs/heads/hdr-enhancement'

    steps:
      - name: Set TimeZone
        shell: pwsh
        run: tzutil /s "UTC"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          (Get-Content .\platform.props) | ForEach-Object { $_ -replace ">10.0<", ">10.0.22621.0<" } | Set-Content .\platform.props

      - name: Set up MSYS
        shell: pwsh
        run: |
          curl -sSL https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z -o MSYS_MinGW-w64_GCC_1421_x86-x64.7z
          7z x MSYS_MinGW-w64_GCC_1421_x86-x64.7z -oC:\MSYS

      - name: Create build directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "_bin\shaders"
          New-Item -ItemType Directory -Force -Path "_bin\lib"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x64"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x86"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x64"

      - name: Build VideoRenderer with HDR Enhancement
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait

      - name: Check build success
        shell: pwsh
        run: |
          Write-Host "Checking for build outputs..."
          if (!(Test-Path "_bin\Filter_x64\MpcVideoRenderer64.ax") -or !(Test-Path "_bin\Filter_x86\MpcVideoRenderer.ax")) {
            Write-Error "Build failed - missing .ax files"
            exit 1
          }
          Write-Host "✅ Build successful - found both 32-bit and 64-bit files"

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: "HDR-Enhancement-Build-Logs-${{ github.run_number }}"
          path: _bin/logs/
          compression-level: 9
        continue-on-error: true

      - name: Upload VideoRenderer binaries
        uses: actions/upload-artifact@v4
        with:
          name: "HDR-Enhancement-Binaries-${{ github.run_number }}"
          path: |
            _bin/**/*.ax
            _bin/**/*.zip
          compression-level: 9

      - name: Generate release info
        if: github.event.inputs.create_release == 'true'
        shell: bash
        run: |
          TIMESTAMP=$(date +"%Y.%m.%d-%H%M")
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "tag=hdr-test-$TIMESTAMP" >> $GITHUB_ENV
            echo "release_name=${{ github.event.inputs.release_name }}" >> $GITHUB_ENV
          else
            echo "tag=hdr-test-$TIMESTAMP" >> $GITHUB_ENV
            echo "release_name=HDR Enhancement Test $TIMESTAMP" >> $GITHUB_ENV
          fi

      - name: Create HDR Test Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag }}
          name: ${{ env.release_name }}
          files: |
            _bin/**/*.ax
            _bin/**/*.zip
          body: |
            🧪 **HDR Enhancement Test Build**
            
            **Build Date**: $(date +"%Y-%m-%d %H:%M UTC")
            **Branch**: hdr-enhancement  
            **Triggered by**: @${{ github.actor }}
            **Build #**: ${{ github.run_number }}
            
            ## 🎯 Enhanced HDR Features:
            - **Enhanced Dolby Vision ACES tone mapping** with dynamic range compression
            - **Advanced shadow detail preservation** (0.0-2.0 range)
            - **Color volume adaptation** for wide gamut displays (0.0-1.0 range)  
            - **Scene-adaptive processing** using dynamic metadata (0.0-1.0 range)
            - **Extended tone mapping algorithms** (8 total vs 4 original)
            - **Registry-configurable parameters** for fine-tuning
            
            ## 🔧 New Registry Settings:
            Location: `HKEY_CURRENT_USER\Software\MPC-BE Filters\MPC Video Renderer`
            - `HdrDynamicRangeCompression` (0.0-1.0, default: 0.5)
            - `HdrShadowDetail` (0.0-2.0, default: 1.2)
            - `HdrColorVolumeAdaptation` (0.0-1.0, default: 0.8) 
            - `HdrSceneAdaptation` (0.0-1.0, default: 0.6)
            
            ## 📋 Testing Instructions:
            1. Install the .ax files using regsvr32 (run as admin)
            2. Configure HDR parameters in registry if needed
            3. Test with HDR10/Dolby Vision content
            4. Report feedback on tone mapping quality
            
            ⚠️ **For Testing Only**: Experimental HDR enhancements
            
            Built from: ${{ github.sha }}