name: HDR Enhancement Manual Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release'
        required: false
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      release_name:
        description: 'Custom release name (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify branch and commit
        shell: pwsh
        run: |
          Write-Host "Current branch: $(git branch --show-current)"
          Write-Host "Current commit: $(git rev-parse HEAD)"
          Write-Host "Checking HDR shader file..."
          if (Test-Path "Shaders\d3d11\ps_fix_hdr10.hlsl") {
            Write-Host "✅ HDR shader file exists"
            Write-Host "First 5 lines of shader:"
            Get-Content "Shaders\d3d11\ps_fix_hdr10.hlsl" | Select-Object -First 5
          } else {
            Write-Host "❌ HDR shader file NOT found"
          }

      - name: Select Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          (Get-Content .\platform.props) | ForEach-Object { $_ -replace ">10.0<", ">10.0.22621.0<" } | Set-Content .\platform.props

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            external/
            _bin/lib/
          key: build-deps-${{ hashFiles('**/external/**', '**/*.vcxproj', '**/*.props') }}
          restore-keys: |
            build-deps-

      - name: Cache MSYS installation
        uses: actions/cache@v4
        id: cache-msys
        with:
          path: C:\MSYS
          key: msys-mingw-w64-gcc-1421-v1
          restore-keys: |
            msys-mingw-w64-gcc-1421-

      - name: Set up MSYS (if not cached)
        if: steps.cache-msys.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "MSYS not cached, downloading..."
          curl -sSL https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z -o MSYS_MinGW-w64_GCC_1421_x86-x64.7z
          7z x MSYS_MinGW-w64_GCC_1421_x86-x64.7z -oC:\MSYS
          Remove-Item MSYS_MinGW-w64_GCC_1421_x86-x64.7z

      - name: Verify MSYS installation
        shell: pwsh
        run: |
          if ('${{ steps.cache-msys.outputs.cache-hit }}' == 'true') {
            Write-Host "✅ MSYS restored from cache"
          } else {
            Write-Host "✅ MSYS downloaded and installed"
          }
          Write-Host "MSYS directory size: $((Get-ChildItem C:\MSYS -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB) MB"

      - name: Create build directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "_bin\shaders"
          New-Item -ItemType Directory -Force -Path "_bin\lib"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x64"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x86"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x64"

      - name: Build VideoRenderer with HDR Enhancement (with logging)
        shell: pwsh
        run: |
          Write-Host "Starting build process..."
          Write-Host "Note: 'Previous IPDB not found' is normal on GitHub Actions (fresh environment)"
          Write-Host "Build command: .\build_mpcvr.cmd NoWait"
          .\build_mpcvr.cmd NoWait
          Write-Host "Build command completed with exit code: $LASTEXITCODE"

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "Checking build outputs..."
          Write-Host "=== Checking for .zip files ==="
          Get-ChildItem -Path "_bin" -Recurse -Filter "*.zip" | ForEach-Object { 
            Write-Host "Found: $($_.FullName) - Size: $($_.Length) bytes - Modified: $($_.LastWriteTime)"
          }
          Write-Host "=== Checking zip contents ==="
          $zipFiles = Get-ChildItem -Path "_bin" -Filter "*.zip"
          foreach ($zip in $zipFiles) {
            Write-Host "Contents of $($zip.Name):"
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $archive = [System.IO.Compression.ZipFile]::OpenRead($zip.FullName)
            $archive.Entries | ForEach-Object { Write-Host "  $($_.FullName)" }
            $archive.Dispose()
          }

      - name: Upload HDR Enhancement Package
        uses: actions/upload-artifact@v4
        with:
          name: "HDR-Enhancement-x64-Package"
          path: |
            _bin/*.zip
          retention-days: 30

      - name: Create HDR Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: hdr-test-${{ github.run_number }}
          name: "HDR Enhancement x64 Build ${{ github.run_number }}"
          files: |
            _bin/*.zip
          body: |
            # HDR Enhancement x64 Build 🎯
            
            Enhanced MPC Video Renderer with advanced HDR tone mapping controls.
            
            ## 🚀 New Features
            - **Dynamic Range Compression** (0.0-1.0, default 0.5)
            - **Shadow Detail Enhancement** (0.0-2.0, default 1.2) 
            - **Color Volume Adaptation** (0.0-1.0, default 0.8)
            - **Scene Adaptation** (0.0-1.0, default 0.6)
            
            ## 📁 Package Contents
            - `MpcVideoRenderer64.ax` - 64-bit video renderer filter
            - `Install_MPCVR_64.cmd` - Easy installation script
            - `Reset_Settings.cmd` - Reset to defaults if needed
            - `Uninstall_MPCVR_64.cmd` - Clean removal script
            - Documentation and license files
            
            ## ⚙️ Registry Settings
            Located at: `HKEY_CURRENT_USER\Software\MPC-BE Filters\MPC Video Renderer`
            
            **Note**: This is a 64-bit only build optimized for modern systems.