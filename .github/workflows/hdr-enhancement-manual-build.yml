name: Build MPC Video Renderer with HDR Enhancement
'on':
  push:
    branches:
      - hdr-enhancement
  pull_request:
    branches:
      - hdr-enhancement
  workflow_dispatch: null
jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Add MSBuild to PATH
        run: >
          Add-Content $env:GITHUB_PATH "C:\Program Files\Microsoft Visual
          Studio\2022\Enterprise\MSBuild\Current\Bin\"
      - name: Download and Install MSYS Environment
        shell: bash
        run: |
          $msysDir = "C:\MSYS"
          $keyFile = Join-Path $msysDir "mingw32\bin\gcc.exe"

          if (Test-Path $msysDir) {
            Remove-Item -Recurse -Force $msysDir
          }

          try {
            curl -sSL "https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z" -o "MSYS.7z"
            & 'C:\Program Files\7-Zip\7z.exe' x MSYS.7z -o$msysDir -y
            Remove-Item MSYS.7z
          } catch {
            Write-Error "Error during MSYS extraction: $($_.Exception.Message)"
            exit 1
          }

          if (-not (Test-Path $keyFile)) {
            Write-Error "MSYS installation failed. Key file '$keyFile' missing."
            Get-ChildItem -Path $msysDir -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
      - name: Create Build Directories
        run: |
          $directories = @(
            "_bin\logs", "_bin\shaders", "_bin\lib\Release_x86",
            "_bin\lib\Release_x64", "_bin\Filter_x86", "_bin\Filter_x64"
          )

          foreach ($dir in $directories) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
          }
      - name: Build VideoRenderer
        run: >
          if (-not (Test-Path ".\build_mpcvr.cmd")) {
            Write-Error "build_mpcvr.cmd not found!"
            exit 1
          }


          & ".\build_mpcvr.cmd" NoWait 2>&1 | Tee-Object -FilePath
          "_bin\logs\build_output.log"


          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      - name: Analyze Build Log for Errors
        if: failure()
        run: |
          $logFile = "_bin\logs\build_output.log"
          if (Test-Path $logFile) {
            Select-String -Path $logFile -Pattern "error (C|LNK|RC)\d{4}","Unresolved external symbol" | ForEach-Object { Write-Host $_.Line }
          } else {
            Write-Warning "Build log not found at $logFile"
          }
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 'mpc-videorenderer-hdr-build-${{ github.run_number }}'
          path: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
            _bin/logs/build_output.log
          retention-days: 7
      - name: Create GitHub Release
        if: >-
          success() && github.event_name == 'push' && github.ref ==
          'refs/heads/hdr-enhancement'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'hdr-build-${{ github.run_number }}'
          name: 'HDR Enhanced Build ${{ github.run_number }}'
          body: |
            Automated build of MPC Video Renderer with HDR enhancements.
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
          files: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
          draft: false
          prerelease: true
