# A descriptive name for the workflow, shown in the GitHub UI.
name: Build MPC Video Renderer with HDR Enhancement

# This section defines what triggers the workflow to run.
on:
  # Runs on pushes (e.g., git push) to the 'hdr-enhancement' branch.
  push:
    branches:
      - hdr-enhancement
  # Runs on pull requests that target the 'hdr-enhancement' branch.
  pull_request:
    branches:
      - hdr-enhancement
  # This enables the "Run workflow" button in the Actions tab for manual runs.
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  # We define a single job named 'build'.
  build:
    # The type of virtual machine to run the job on. 'windows-2022' is appropriate.
    runs-on: windows-2022
    # Sets default settings for all 'run' steps in this job.
    defaults:
      run:
        # This is a key change: It makes PowerShell ('pwsh') the default shell.
        # This avoids ambiguity and ensures consistent script execution.
        shell: pwsh

    # A job contains a sequence of tasks called steps.
    steps:
      # Step 1: Checks out your repository code so the job can access it.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # This ensures that any Git submodules are also downloaded.
          submodules: recursive

      # Step 2: A diagnostic step to confirm the correct code is being used.
      # The '|' (literal block scalar) is crucial. It tells YAML to treat the
      # following indented block as a raw string, preserving newlines and
      # preventing the runner from messing with PowerShell's syntax.
      - name: Verify branch and commit
        run: |
          Write-Host "Current branch: $(git branch --show-current)"
          Write-Host "Current commit: $(git rev-parse HEAD)"
          Write-Host "Checking HDR shader file..."
          $shaderPaths = @(
            "Shaders\d3d11\ps_fix_hdr10.hlsl",
            "Source\Shaders\d3d11\ps_fix_hdr10.hlsl",
            "shaders\d3d11\ps_fix_hdr10.hlsl",
            "src\shaders\d3d11\ps_fix_hdr10.hlsl"
          )
          $found = $false
          foreach ($path in $shaderPaths) {
            if (Test-Path $path) {
              Write-Host "HDR shader file found at: $path"
              Write-Host "First 5 lines of shader:"
              Get-Content $path | Select-Object -First 5
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "HDR shader file NOT found in any expected location."
            Get-ChildItem -Recurse -Filter "*.hlsl" | Select-Object -First 10
          }

      # Step 3: This is the fully corrected version of the step that was failing.
      # It uses robust, idiomatic PowerShell to find, check, and fix files.
      - name: Fix RC1004 Error - Add newlines and validate resource files
        run: |
          Write-Host "Fixing potential RC1004 errors by ensuring proper file endings..."

          # This pipeline gets all 'resource.h' files and processes each one.
          # Using ForEach-Object is efficient and standard PowerShell practice.
          Get-ChildItem -Recurse -Filter "resource.h" | ForEach-Object {
            Write-Host "Checking file: $($_.FullName)"
            $content = Get-Content $_.FullName -Raw
            # Ensure file is not empty and doesn't already end with a newline.
            if ($content -and -not $content.EndsWith("`r`n")) {
              Write-Host "Adding newline to: $($_.FullName)"
              # Add-Content is the correct cmdlet for appending to a file.
              Add-Content -Path $_.FullName -Value "`r`n"
            }
          }

          Get-ChildItem -Recurse -Filter "*.rc" | ForEach-Object {
            Write-Host "Checking RC file: $($_.FullName)"
            $content = Get-Content $_.FullName -Raw
            if ($content -and -not $content.EndsWith("`r`n")) {
              Write-Host "Adding newline to: $($_.FullName)"
              Add-Content -Path $_.FullName -Value "`r`n"
            }
          }

          # This re-uses the file list to perform validation.
          Get-ChildItem -Recurse -Filter "resource.h" | ForEach-Object {
            Write-Host "Validating syntax in: $($_.FullName)"
            $content = Get-Content $_.FullName
            # The syntax here is now safe. We store the count in a variable first.
            $lineCount = $content.Count
            Write-Host "Total lines: $lineCount"

            # Check for unmatched preprocessor directives.
            $ifCount = ($content | Select-String -Pattern "^\s*#if").Count
            $endifCount = ($content | Select-String -Pattern "^\s*#endif").Count
            Write-Host "#if directives: $ifCount, #endif directives: $endifCount"
            if ($ifCount -ne $endifCount) {
              Write-Host "WARNING: Unmatched preprocessor directives in $($_.FullName)"
            }
          }

      # Step 4: Selects the correct Windows SDK.
      - name: Select Windows SDK 10.0.22621.0
        run: |
          if (Test-Path ".\platform.props") {
            Write-Host "Updating platform.props..."
            # This is a clean, one-line way to read, replace, and write back the content.
            (Get-Content .\platform.props) -replace ">10.0<", ">10.0.22621.0<" | Set-Content .\platform.props
            Write-Host "Platform props updated"
          } else {
            Write-Host "platform.props not found, skipping SDK selection"
          }

      # Steps 5 & 6: Cache steps to speed up subsequent runs.
      # The syntax is standard and correct for the cache action.
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            external/
            _bin/lib/
          key: build-deps-${{ hashFiles('**/*.vcxproj', '**/*.props') }}
          restore-keys: |
            build-deps-

      - name: Cache MSYS installation
        uses: actions/cache@v4
        with:
          path: C:\MSYS
          key: msys-mingw-w64-gcc-1421-v2
          restore-keys: |
            msys-mingw-w64-gcc-1421-

      # Step 7: Downloads and extracts MSYS only if the cache was not found.
      # 'if' condition syntax is correct. The 'try/catch' block provides robust error handling.
      - name: Set up MSYS (if not cached)
        if: steps.cache-msys.outputs.cache-hit != 'true'
        run: |
          Write-Host "MSYS not cached, downloading..."
          try {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z" -OutFile "MSYS.7z" -UseBasicParsing
            Write-Host "MSYS downloaded successfully"
            # Assumes 7-Zip (7z) is available on the runner, which it is.
            7z x MSYS.7z -oC:\MSYS
            Remove-Item MSYS.7z
            Write-Host "MSYS extracted successfully"
          } catch {
            Write-Host "Failed to download or extract MSYS: $($_.Exception.Message)"
            exit 1
          }

      # Step 8: Verifies the MSYS installation from either cache or download.
      - name: Verify MSYS installation
        run: |
          # Using quotes around the context variable is a good practice inside scripts.
          if ('${{ steps.cache-msys.outputs.cache-hit }}' -eq 'true') {
            Write-Host "MSYS restored from cache"
          } else {
            Write-Host "MSYS downloaded and installed"
          }
          if (-not (Test-Path "C:\MSYS")) {
            Write-Host "MSYS directory not found!"
            exit 1
          }

      # Step 9: Creates necessary directories for the build output. Simple and correct.
      - name: Create build directories
        run: |
          $directories = @("_bin\shaders", "_bin\lib\Release_x86", "_bin\lib\Release_x64", "_bin\Filter_x86", "_bin\Filter_x64")
          foreach ($dir in $directories) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
            Write-Host "Created directory: $dir"
          }

      # Step 10: Executes the main build command.
      - name: Build VideoRenderer with HDR Enhancement
        run: |
          Write-Host "Starting build process..."
          if (-not (Test-Path ".\build_mpcvr.cmd")) {
            Write-Host "build_mpcvr.cmd not found!"
            exit 1
          }
          
          Write-Host "Build command: .\build_mpcvr.cmd NoWait"
          try {
            # This is a robust way to run an external command and reliably get its exit code.
            $process = Start-Process -FilePath ".\build_mpcvr.cmd" -ArgumentList "NoWait" -Wait -PassThru
            $buildExitCode = $process.ExitCode
            Write-Host "Build command completed with exit code: $buildExitCode"
            
            if ($buildExitCode -ne 0) {
              Write-Host "Build failed with exit code: $buildExitCode"
              # Log parsing logic is sound.
              Get-ChildItem -Path "_bin\logs" -Filter "*.log" -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "Checking log file: $($_.Name)"
                $rcErrors = Get-Content $_.FullName -ErrorAction SilentlyContinue | Select-String -Pattern "RC\d{4}"
                if ($rcErrors) {
                  Write-Host "Found RC errors in $($_.Name):"
                  $rcErrors | ForEach-Object { Write-Host "  $_" }
                }
              }
              exit $buildExitCode
            }
          } catch {
            Write-Host "Build failed with exception: $($_.Exception.Message)"
            exit 1
          }

      # Step 11: Verifies that the expected build files were created.
      - name: Verify build outputs
        run: |
          Write-Host "Verifying build outputs..."
          $expectedFiles = @("_bin\Filter_x86\MpcVideoRenderer.ax", "_bin\Filter_x64\MpcVideoRenderer64.ax")
          $allFound = $true
          foreach ($file in $expectedFiles) {
            if (Test-Path $file) {
              $fileInfo = Get-Item $file
              # This PowerShell syntax for string formatting is safe and will work correctly.
              Write-Host "✓ Found: $file (Size: $([math]::Round($fileInfo.Length / 1KB, 2)) KB)"
            } else {
              Write-Host "✗ Missing: $file"
              $allFound = $false
            }
          }
          if (-not $allFound) {
            Write-Host "Some expected files are missing!"
            exit 1
          }

      # Step 12: Uploads the build output as an artifact.
      # The 'if: success()' ensures this only runs if all previous steps passed.
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mpc-videorenderer-hdr-${{ github.sha }}
          path: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
          retention-days: 30

      # Step 13: Creates a GitHub Release.
      # The 'if' condition correctly ensures this only runs on a push to the specific branch.
      - name: Create Release (on push to hdr-enhancement branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/hdr-enhancement'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hdr-build-${{ github.run_number }}
          name: HDR Enhanced Build ${{ github.run_number }}
          body: |
            Automated build of MPC Video Renderer with HDR enhancements.
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
          files: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
          draft: false
          prerelease: true