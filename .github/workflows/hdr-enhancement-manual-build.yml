name: Build MPC Video Renderer with HDR Enhancement
'on':
  push:
    branches:
      - hdr-enhancement
  pull_request:
    branches:
      - hdr-enhancement
  workflow_dispatch: null
jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Add MSBuild to PATH
        run: >-
          Add-Content $env:GITHUB_PATH "C:\Program Files\Microsoft Visual
          Studio\2022\Enterprise\MSBuild\Current\Bin\"
      - name: Download and Install MSYS Environment
        run: >
          Write-Host "--- Downloading and Installing MSYS Environment ---"
          -ForegroundColor Yellow

          $msysDir = "C:\MSYS"

          $tempExtractDir = "C:\msys_temp"

          $keyFile = "$msysDir\mingw32.exe"


          # Clean up any previous attempts

          if (Test-Path $msysDir) {
            Write-Host "Removing existing MSYS directory..."
            Remove-Item -Recurse -Force $msysDir
          }

          if (Test-Path $tempExtractDir) {
            Write-Host "Removing existing temp extraction directory..."
            Remove-Item -Recurse -Force $tempExtractDir
          }

          New-Item -ItemType Directory -Force -Path $tempExtractDir | Out-Null


          try {
            Write-Host "Downloading MSYS archive..."
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z" -OutFile "MSYS.7z" -UseBasicParsing
            
            Write-Host "Extracting MSYS to temporary location: $tempExtractDir"
            & 'C:\Program Files\7-Zip\7z.exe' x MSYS.7z -o$tempExtractDir -y
            
            # --- This is the critical fix ---
            Write-Host "Locating the actual MSYS content folder within the extraction..."
            $sourceFolder = Get-ChildItem -Path $tempExtractDir | Select-Object -First 1
            if (-not $sourceFolder) {
              Write-Error "FATAL: No subfolder found in the extracted MSYS archive."
              exit 1
            }
            Write-Host "Found content in: $($sourceFolder.FullName)"
            
            Write-Host "Moving content from '$($sourceFolder.FullName)' to '$msysDir'..."
            # Move all items (* and .*) from the source folder to the final destination
            Move-Item -Path "$($sourceFolder.FullName)\*" -Destination $msysDir
            
            Write-Host "Cleaning up temporary directories and archive..."
            Remove-Item -Recurse -Force $tempExtractDir
            Remove-Item MSYS.7z
          } catch {
            Write-Error "A critical error occurred during MSYS setup: $($_.Exception.Message)"
            exit 1
          }


          # Final, simple verification

          Write-Host "Verifying final MSYS installation..."

          if (-not (Test-Path $keyFile)) {
            Write-Error "FATAL: MSYS installation failed. Key file '$keyFile' was not found."
            Write-Host "Listing contents of C:\MSYS to help debug:"
            Get-ChildItem -Path $msysDir -Depth 1 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }


          Write-Host "MSYS installed and verified successfully."
          -ForegroundColor Green

          Write-Host "---------------------------------------------------"
      - name: Create Build Directories
        run: >
          Write-Host "--- Creating Build Directories ---" -ForegroundColor
          Yellow

          $directories = @("_bin\logs", "_bin\shaders", "_bin\lib\Release_x86",
          "_bin\lib\Release_x64", "_bin\Filter_x86", "_bin\Filter_x64")

          foreach ($dir in $directories) {
            if (-not (Test-Path $dir)) {
              New-Item -ItemType Directory -Force -Path $dir | Out-Null
            }
          }

          Write-Host "Build directories are ready."
      - name: Build VideoRenderer with HDR Enhancement
        run: >
          Write-Host "--- Starting Build ---" -ForegroundColor Yellow

          if (-not (Test-Path ".\build_mpcvr.cmd")) {
            Write-Error "build_mpcvr.cmd not found in the root directory!"
            exit 1
          }


          # Execute the build and stream output to console while also saving to
          a log file

          & ".\build_mpcvr.cmd" NoWait 2>&1 | Tee-Object -FilePath
          "_bin\logs\build_output.log"


          $buildExitCode = $LASTEXITCODE


          if ($buildExitCode -ne 0) {
            Write-Error "BUILD FAILED with exit code: $buildExitCode"
            
            # Detailed Error Analysis
            Write-Host "--- Analyzing Build Log for Errors ---" -ForegroundColor Yellow
            $logFile = "_bin\logs\build_output.log"
            if (Test-Path $logFile) {
              $logContent = Get-Content $logFile
              $errors = $logContent | Select-String -Pattern "error C\d{4}:", "error LNK\d{4}:", "error RC\d{4}:", "Unresolved external symbol" -AllMatches
              if ($errors) {
                Write-Host "Found $($errors.Count) error(s) in the build log:" -ForegroundColor Red
                $errors.Line | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              } else {
                 Write-Host "No lines matching standard error patterns found. Check full log for details." -ForegroundColor Cyan
              }
            } else {
              Write-Warning "Build log file not found at $logFile"
            }
            exit $buildExitCode
          } else {
            Write-Host "BUILD SUCCEEDED!" -ForegroundColor Green
          }
      - name: Verify build outputs
        run: >
          Write-Host "--- Verifying Build Outputs ---" -ForegroundColor Yellow

          $expectedFiles = @("_bin\Filter_x86\MpcVideoRenderer.ax",
          "_bin\Filter_x64\MpcVideoRenderer64.ax")

          $allFound = $true

          foreach ($file in $expectedFiles) {
            if (Test-Path $file) {
              Write-Host "✓ Found: $file" -ForegroundColor Green
            } else {
              Write-Error "✗ Missing required build output: $file"
              $allFound = $false
            }
          }

          if (-not $allFound) {
            Write-Error "Build verification failed."
            exit 1
          }

          Write-Host "All build outputs verified successfully." -ForegroundColor
          Green
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 'mpc-videorenderer-hdr-build-${{ github.run_number }}'
          path: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
            _bin/logs/build_output.log
          retention-days: 7
      - name: Create GitHub Release
        if: >-
          success() && github.event_name == 'push' && github.ref ==
          'refs/heads/hdr-enhancement'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'hdr-build-${{ github.run_number }}'
          name: 'HDR Enhanced Build ${{ github.run_number }}'
          body: |
            Automated build of MPC Video Renderer with HDR enhancements.
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
          files: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
          draft: false
          prerelease: true
