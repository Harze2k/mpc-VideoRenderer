name: Build MPC Video Renderer with HDR Enhancement
'on':
  push:
    branches:
      - hdr-enhancement
  pull_request:
    branches:
      - hdr-enhancement
  workflow_dispatch: null
jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fix RC1004 Error - Add newlines and validate resource files
        run: >
          Write-Host "--- Validating and Fixing Resource Files ---"
          -ForegroundColor Yellow

          $filesToCheck = @()

          $filesToCheck += Get-ChildItem -Recurse -Filter "resource.h"

          $filesToCheck += Get-ChildItem -Recurse -Filter "*.rc"

          foreach ($file in $filesToCheck) {
            Write-Host "Checking file: $($file.FullName)"
            try {
              $content = Get-Content $file.FullName -Raw
              if ([string]::IsNullOrEmpty($content)) {
                Write-Host "  -> File is empty or could not be read. Skipping."
                continue
              }
              if (-not $content.EndsWith("`r`n")) {
                Write-Host "  -> Adding newline to: $($file.FullName)" -ForegroundColor Cyan
                Add-Content -Path $file.FullName -Value "`r`n"
              } else {
                Write-Host "  -> File ending is OK."
              }
            } catch {
              Write-Warning "Could not read file $($file.FullName): $($_.Exception.Message)"
            }
          }

          Write-Host "--- Validating Preprocessor Directives ---"
          -ForegroundColor Yellow

          Get-ChildItem -Recurse -Filter "resource.h" | ForEach-Object {
            Write-Host "Validating directives in: $($_.FullName)"
            $content = Get-Content $_.FullName
            $ifCount = ($content | Where-Object { $_ -match "^\s*#if" }).Count
            $endifCount = ($content | Where-Object { $_ -match "^\s*#endif" }).Count
            Write-Host "  -> #if count: $ifCount, #endif count: $endifCount"
            if ($ifCount -ne $endifCount) {
              Write-Warning "Unmatched preprocessor directives found. This could cause compilation errors."
            }
          }

          Write-Host "------------------------------------------"
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Add MSBuild to PATH
        run: >
          Add-Content $env:GITHUB_PATH "C:\Program Files\Microsoft Visual
          Studio\2022\Enterprise\MSBuild\Current\Bin\"

          Write-Host "MSBuild added to PATH."
      - name: Download and Install MSYS Environment
        run: >
          Write-Host "--- Downloading and Installing MSYS ---" -ForegroundColor
          Yellow

          $msysDir = "C:\MSYS"

          $keyFile = "$msysDir\mingw32.exe"


          # Clean up any previous attempts

          if (Test-Path $msysDir) {
            Write-Host "Removing existing MSYS directory to ensure a clean slate."
            Remove-Item -Recurse -Force $msysDir
          }


          try {
            Write-Host "Downloading MSYS..."
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z" -OutFile "MSYS.7z" -UseBasicParsing
            
            Write-Host "Extracting MSYS to $msysDir..."
            & 'C:\Program Files\7-Zip\7z.exe' x MSYS.7z -o$msysDir -y
            
            Write-Host "Cleaning up downloaded archive..."
            Remove-Item MSYS.7z
          } catch {
            Write-Error "A critical error occurred during MSYS download or extraction: $($_.Exception.Message)"
            exit 1
          }


          # Final, simple verification

          Write-Host "Verifying MSYS installation..."

          if (-not (Test-Path $keyFile)) {
            Write-Error "FATAL: MSYS installation failed. Key file '$keyFile' was not found after extraction."
            Write-Host "Listing contents of C:\ to help debug:"
            Get-ChildItem -Path C:\ -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }


          Write-Host "MSYS installed and verified successfully."
          -ForegroundColor Green

          Write-Host "---------------------------------------"
      - name: Create Build Directories
        run: >
          Write-Host "--- Creating Build Directories ---" -ForegroundColor
          Yellow

          $directories = @("_bin\logs", "_bin\shaders", "_bin\lib\Release_x86",
          "_bin\lib\Release_x64", "_bin\Filter_x86", "_bin\Filter_x64")

          foreach ($dir in $directories) {
            if (-not (Test-Path $dir)) {
              New-Item -ItemType Directory -Force -Path $dir | Out-Null
              Write-Host "Created directory: $dir"
            }
          }

          Write-Host "----------------------------------"
      - name: Build VideoRenderer with HDR Enhancement
        run: >
          Write-Host "--- Starting Build ---" -ForegroundColor Yellow

          if (-not (Test-Path ".\build_mpcvr.cmd")) {
            Write-Error "build_mpcvr.cmd not found in the root directory!"
            exit 1
          }


          Write-Host "Executing: & '.\build_mpcvr.cmd' NoWait"

          Write-Host "Build output will be streamed below and saved to
          _bin\logs\build_output.log"


          & ".\build_mpcvr.cmd" NoWait 2>&1 | Tee-Object -FilePath
          "_bin\logs\build_output.log"


          $buildExitCode = $LASTEXITCODE

          Write-Host "--------------------"


          if ($buildExitCode -ne 0) {
            Write-Error "BUILD FAILED with exit code: $buildExitCode"
            
            Write-Host "--- Analyzing Build Log for Errors ---" -ForegroundColor Yellow
            $logFile = "_bin\logs\build_output.log"
            if (Test-Path $logFile) {
              $logContent = Get-Content $logFile
              $errors = $logContent | Select-String -Pattern "error C\d{4}:", "error LNK\d{4}:", "error RC\d{4}:", "Unresolved external symbol" -AllMatches
              $warnings = $logContent | Select-String -Pattern "warning C\d{4}:" -AllMatches

              if ($errors) {
                Write-Host "Found $($errors.Count) error(s) in the build log:" -ForegroundColor Red
                $errors.Line | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              } else {
                 Write-Host "No lines matching standard error patterns (C/LNK/RC) found. Check full log for details." -ForegroundColor Cyan
              }

              if ($warnings) {
                 Write-Host "Found $($warnings.Count) warning(s) in the build log:" -ForegroundColor Yellow
                 $warnings.Line | ForEach-Object { Write-Host "  $_" -ForegroundColor Yellow }
              }
            } else {
              Write-Warning "Build log file not found at $logFile"
            }
            exit $buildExitCode
          } else {
            Write-Host "BUILD SUCCEEDED!" -ForegroundColor Green
          }
      - name: Verify build outputs
        run: >
          Write-Host "--- Verifying Build Outputs ---" -ForegroundColor Yellow

          $expectedFiles = @("_bin\Filter_x86\MpcVideoRenderer.ax",
          "_bin\Filter_x64\MpcVideoRenderer64.ax")

          $allFound = $true

          foreach ($file in $expectedFiles) {
            if (Test-Path $file) {
              $fileInfo = Get-Item $file
              Write-Host "✓ Found: $file (Size: $([math]::Round($fileInfo.Length / 1KB, 2)) KB)" -ForegroundColor Green
            } else {
              Write-Error "✗ Missing required build output: $file"
              $allFound = $false
            }
          }

          if (-not $allFound) {
            Write-Error "Build verification failed. Some expected files are missing."
            exit 1
          }

          Write-Host "All build outputs verified successfully." -ForegroundColor
          Green

          Write-Host "---------------------------------"
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 'mpc-videorenderer-hdr-build-${{ github.run_number }}'
          path: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
            _bin/logs/build_output.log
          retention-days: 7
      - name: Create GitHub Release
        if: >-
          success() && github.event_name == 'push' && github.ref ==
          'refs/heads/hdr-enhancement'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'hdr-build-${{ github.run_number }}'
          name: 'HDR Enhanced Build ${{ github.run_number }}'
          body: |
            Automated build of MPC Video Renderer with HDR enhancements.
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
          files: |
            _bin/Filter_x86/MpcVideoRenderer.ax
            _bin/Filter_x64/MpcVideoRenderer64.ax
          draft: false
          prerelease: true