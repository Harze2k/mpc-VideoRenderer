name: Manual Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release (true/false)'
        required: false
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      release_name:
        description: 'Custom release name (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Set TimeZone
        shell: pwsh
        run: tzutil /s "UTC"

      - name: Show system info
        shell: pwsh
        run: |
          Get-CimInstance -ClassName Win32_Processor
          systeminfo

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          (Get-Content .\platform.props) | ForEach-Object { $_ -replace ">10.0<", ">10.0.22621.0<" } | Set-Content .\platform.props

      - name: Set up MSYS
        shell: pwsh
        run: |
          curl -sSL https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z -o MSYS_MinGW-w64_GCC_1421_x86-x64.7z
          7z x MSYS_MinGW-w64_GCC_1421_x86-x64.7z -oC:\MSYS

      - name: Create build directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "_bin\shaders"
          New-Item -ItemType Directory -Force -Path "_bin\lib"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x64"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x86"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x64"

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: "VideoRenderer-Manual-Build-Logs"
          path: _bin/logs/
          compression-level: 9
        continue-on-error: true

      - name: Upload VideoRenderer binaries
        uses: actions/upload-artifact@v4
        with:
          name: "VideoRenderer-Manual-Build-Binaries"
          path: |
            _bin/**/*.ax
            _bin/**/*.zip
          compression-level: 9

      - name: Generate release info
        if: github.event.inputs.create_release == 'true'
        shell: bash
        run: |
          TIMESTAMP=$(date +"%Y.%m.%d-%H%M")
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "tag=manual-$TIMESTAMP" >> $GITHUB_ENV
            echo "release_name=${{ github.event.inputs.release_name }}" >> $GITHUB_ENV
          else
            echo "tag=manual-$TIMESTAMP" >> $GITHUB_ENV
            echo "release_name=Manual Build $TIMESTAMP" >> $GITHUB_ENV
          fi

      - name: Create Manual Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag }}
          name: ${{ env.release_name }}
          files: |
            _bin/**/*.ax
            _bin/**/*.zip
          body: |
            🛠️ **Manual build**
            
            **Build Date**: $(date +"%Y-%m-%d %H:%M UTC")
            **Triggered by**: @${{ github.actor }}
            
            ## What's included:
            - MpcVideoRenderer64.ax (64-bit DirectShow filter)
            - MpcVideoRenderer.ax (32-bit DirectShow filter)
            - Installation packages
            
            ## Features:
            - HDR10 metadata tonemapping support (from the excellent work of: https://github.com/thefallentree/mpc-VideoRenderer)
            - HDR nits value saving fix (from the excellent work of: https://github.com/thefallentree/mpc-VideoRenderer)
            - Latest improvements and fixes
            
            Built from commit: ${{ github.sha }}