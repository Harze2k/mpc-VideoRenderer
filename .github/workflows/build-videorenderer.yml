name: Build VideoRenderer

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (true/false)'
        required: false
        default: 'true'
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Set TimeZone
        shell: pwsh
        run: tzutil /s "UTC"

      - name: Show system info
        shell: pwsh
        run: |
          Get-CimInstance -ClassName Win32_Processor
          systeminfo

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          (Get-Content .\platform.props) | ForEach-Object { $_ -replace ">10.0<", ">10.0.22621.0<" } | Set-Content .\platform.props

      - name: Set up MSYS
        shell: pwsh
        run: |
          curl -sSL https://raw.githubusercontent.com/Aleksoid1978/MSYS/refs/heads/main/MSYS_MinGW-w64_GCC_1421_x86-x64.7z -o MSYS_MinGW-w64_GCC_1421_x86-x64.7z
          7z x MSYS_MinGW-w64_GCC_1421_x86-x64.7z -oC:\MSYS

      - name: Create build directories
        shell: pwsh
        run: |
          # Create required build directories
          New-Item -ItemType Directory -Force -Path "_bin\shaders"
          New-Item -ItemType Directory -Force -Path "_bin\lib"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Release_x64"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Debug_x86"
          New-Item -ItemType Directory -Force -Path "_bin\lib\Debug_x64"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x86"
          New-Item -ItemType Directory -Force -Path "_bin\Filter_x64"

      - name: Build VideoRenderer
        shell: pwsh
        run: |
          .\build_mpcvr.cmd NoWait

      - name: Check build output
        shell: pwsh
        run: |
          Write-Host "Checking build outputs..."
          Get-ChildItem -Path "_bin" -Recurse -Name "*.ax" | ForEach-Object { Write-Host "Found: $_" }
          Get-ChildItem -Path "_bin" -Recurse -Name "*.zip" | ForEach-Object { Write-Host "Found: $_" }

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: "VideoRenderer-Build-Logs"
          path: _bin/logs/
          compression-level: 9
        continue-on-error: true

      - name: Upload VideoRenderer binaries
        uses: actions/upload-artifact@v4
        with:
          name: "VideoRenderer-Binaries"
          path: |
            _bin/**/*.ax
            _bin/**/*.zip
          compression-level: 9
        continue-on-error: true

      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: echo "tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag }}
          name: "VideoRenderer Build ${{ env.tag }}"
          files: |
            _bin/**/*.ax
            _bin/**/*.zip
          body: |
            Automated build of VideoRenderer with HDR10 metadata tonemapping features.
            
            ## What's included:
            - MpcVideoRenderer64.ax (64-bit DirectShow filter)
            - MpcVideoRenderer.ax (32-bit DirectShow filter)
            - Installation packages
            
            ## Features:
            - HDR10 metadata tonemapping support
            - HDR nits value saving fix
            - Latest upstream improvements
            
            Built from commit: ${{ github.sha }}